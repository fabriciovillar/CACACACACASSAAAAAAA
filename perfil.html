<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Perfil - BetGPT Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>
<body>
  <div class="bm-loader"><div class="bm-spinner"></div></div>
  <div id="navbarMount"></div>

  <div class="container py-4">
    <h4 class="mb-3"><i class="fas fa-user text-green me-2"></i>Mi perfil</h4>
    <div class="row g-4">
      <div class="col-lg-5">
        <div class="bm-card text-center">
          <div class="profile-avatar mx-auto mb-3" id="avatar">U</div>
          <h5 id="fullName" class="mb-1"></h5>
          <p class="text-muted-bm" id="email"></p>
          <div class="divider"></div>
          <div class="d-flex justify-content-around">
            <div><div class="text-muted-bm small">Saldo</div><div class="text-green fw-bold" id="balance"></div></div>
            <div><div class="text-muted-bm small">Apuestas</div><div class="fw-bold" id="totalBets"></div></div>
            <div><div class="text-muted-bm small">Ganadas</div><div class="text-green fw-bold" id="wonBets"></div></div>
          </div>
        </div>
      </div>
      <div class="col-lg-7">
        <div class="bm-card">
          <h6 class="text-muted-bm mb-3">Datos personales</h6>
          <div class="row g-3">
            <div class="col-md-6"><div class="text-muted-bm small">Nombre</div><div id="pNombre"></div></div>
            <div class="col-md-6"><div class="text-muted-bm small">Apellido</div><div id="pApellido"></div></div>
            <div class="col-md-6"><div class="text-muted-bm small">DNI</div><div id="pDni"></div></div>
            <div class="col-md-6"><div class="text-muted-bm small">Fecha de nacimiento</div><div id="pNac"></div></div>
            <div class="col-md-6"><div class="text-muted-bm small">Miembro desde</div><div id="pSince"></div></div>
          </div>
        </div>
        <div class="bm-card mt-3">
          <h6 class="text-muted-bm mb-3">Últimos movimientos</h6>
          <div class="table-responsive">
            <table class="bm-table">
              <thead><tr><th>Fecha</th><th>Tipo</th><th>Monto</th></tr></thead>
              <tbody id="movBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="modalsMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script src="fondos.js"></script>
  <script>
    requireAuth();
    function mount() {
      document.getElementById('navbarMount').innerHTML = renderNavbar('perfil');
      document.getElementById('modalsMount').innerHTML = renderFundsModals();
      initFundsHandlers(mount);
      const u = getSession();
      document.getElementById('avatar').textContent = (u.nombre[0]+u.apellido[0]).toUpperCase();
      document.getElementById('fullName').textContent = u.nombre + ' ' + u.apellido;
      document.getElementById('email').textContent = u.email;
      document.getElementById('balance').textContent = fmtMoney(u.balance);
      const bets = DB.get(KEYS.BETS, []).filter(b => b.user === u.email);
      document.getElementById('totalBets').textContent = bets.length;
      document.getElementById('wonBets').textContent = bets.filter(b => b.estado === 'Ganadora').length;
      document.getElementById('pNombre').textContent = u.nombre;
      document.getElementById('pApellido').textContent = u.apellido;
      document.getElementById('pDni').textContent = u.dni;
      document.getElementById('pNac').textContent = u.nacimiento;
      document.getElementById('pSince').textContent = new Date(u.createdAt).toLocaleDateString('es-AR');
      const movs = DB.get(KEYS.MOVEMENTS, []).filter(m => m.user === u.email).slice(-10).reverse();
      const body = document.getElementById('movBody');
      body.innerHTML = movs.length === 0
        ? `<tr><td colspan="3" class="text-center text-muted-bm py-3">Sin movimientos</td></tr>`
        : movs.map(m => `<tr><td>${fmtDate(m.fecha)}</td><td>${m.tipo}</td><td class="${m.tipo==='Depósito'?'text-green':'text-yellow'}">${m.tipo==='Depósito'?'+':'-'}${fmtMoney(m.monto)}</td></tr>`).join('');
    }
    document.addEventListener('bm:balance', mount);
    mount();
  </script>
</body>
</html>
