<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iniciar sesión - BetGPT Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>
<body>
  <div class="bm-loader"><div class="bm-spinner"></div></div>
  <div class="auth-wrap">
    <div class="bm-card auth-card">
      <div class="text-center mb-4">
        <a href="index.html" class="bm-brand"><i class="fas fa-trophy text-green"></i> Bet<span class="accent">GPT</span> Pro</a>
        <h4 class="mt-3 mb-1">Iniciar sesión</h4>
        <p class="text-muted-bm">Bienvenido de nuevo</p>
      </div>
      <form onsubmit="handleLogin(event)">
        <div class="mb-3"><label class="form-label">Correo</label><input type="email" class="form-control" name="email" required></div>
        <div class="mb-3"><label class="form-label">Contraseña</label><input type="password" class="form-control" name="password" required></div>
        <div class="d-grid"><button class="btn btn-bm"><i class="fas fa-right-to-bracket me-1"></i>Iniciar sesión</button></div>
        <p class="text-center mt-3 text-muted-bm">¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script src="auth.js"></script>
</body>
</html>
