<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - BetMaster Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>
<body>
  <div class="bm-loader"><div class="bm-spinner"></div></div>
  <div id="navbarMount"></div>

  <div class="bm-shell">
    <aside class="bm-sidebar">
      <h6>Deportes</h6>
      <div class="bm-sport active"><i class="fas fa-futbol"></i> Fútbol</div>
      <div class="bm-sport disabled"><i class="fas fa-basketball"></i> Básquet</div>
      <div class="bm-sport disabled"><i class="fas fa-baseball-bat-ball"></i> Tenis</div>
      <div class="bm-sport disabled"><i class="fas fa-gamepad"></i> eSports</div>
      <div class="divider"></div>
      <h6>Atajos</h6>
      <a class="bm-sport" href="historial.html"><i class="fas fa-clock-rotate-left"></i> Historial</a>
      <a class="bm-sport" href="perfil.html"><i class="fas fa-user"></i> Perfil</a>
    </aside>

    <main>
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h4 class="mb-0"><i class="fas fa-futbol text-green me-2"></i>Partidos destacados</h4>
        <span class="text-muted-bm small">Selecciona una cuota para apostar</span>
      </div>
      <div id="matchesList"></div>
    </main>

    <aside class="bm-ticket-col">
      <div class="bm-ticket" id="ticket"></div>
    </aside>
  </div>

  <div id="modalsMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script src="auth.js"></script>
  <script src="fondos.js"></script>
  <script src="apuestas.js"></script>
  <script>
    requireAuth();
    function mountChrome() {
      document.getElementById('navbarMount').innerHTML = renderNavbar('dashboard');
      document.getElementById('modalsMount').innerHTML = renderFundsModals();
      initFundsHandlers(refreshBalance);
    }
    function refreshBalance() {
      document.getElementById('navbarMount').innerHTML = renderNavbar('dashboard');
      document.getElementById('modalsMount').innerHTML = renderFundsModals();
      initFundsHandlers(refreshBalance);
      renderTicket();
    }
    document.addEventListener('bm:balance', refreshBalance);
    mountChrome();
    document.getElementById('matchesList').innerHTML = renderMatches();
    bindMatchClicks();
    renderTicket();
    highlightSelection();
  </script>
</body>
</html>
