<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Historial - BetGPT Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>
<body>
  <div class="bm-loader"><div class="bm-spinner"></div></div>
  <div id="navbarMount"></div>

  <div class="container py-4">
    <h4 class="mb-3"><i class="fas fa-clock-rotate-left text-green me-2"></i>Historial de apuestas</h4>
    <div class="bm-card">
      <div class="table-responsive">
        <table class="bm-table">
          <thead>
            <tr>
              <th>Fecha</th><th>Partido</th><th>Selección</th>
              <th>Monto</th><th>Cuota</th><th>Estado</th>
              <th>Ganancia</th><th>Acciones</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="modalsMount"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script src="fondos.js"></script>
  <script src="apuestas.js"></script>
  <script>
    requireAuth();
    function mountChrome() {
      document.getElementById('navbarMount').innerHTML = renderNavbar('hist');
      document.getElementById('modalsMount').innerHTML = renderFundsModals();
      initFundsHandlers(() => { mountChrome(); renderHistory(); });
    }
    function renderHistory() {
      const user = getSession();
      const bets = DB.get(KEYS.BETS, []).filter(b => b.user === user.email);
      const body = document.getElementById('historyBody');
      if (bets.length === 0) {
        body.innerHTML = `<tr><td colspan="8" class="text-center text-muted-bm py-4">Aún no tienes apuestas.</td></tr>`;
        return;
      }
      body.innerHTML = bets.map(b => `
        <tr>
          <td>${fmtDate(b.fecha)}</td>
          <td>${b.partido}</td>
          <td>${b.seleccion}</td>
          <td>${fmtMoney(b.monto)}</td>
          <td class="text-yellow"><strong>${b.cuota.toFixed(2)}</strong></td>
          <td><span class="badge-status badge-${b.estado.toLowerCase()}">${b.estado}</span></td>
          <td>${b.estado === 'Ganadora' ? '<span class="text-green">+'+fmtMoney(b.ganancia)+'</span>' : '-'}</td>
          <td>
            ${b.estado === 'Pendiente' ? `
              <button class="btn btn-bm btn-sm" onclick="settleBet('${b.id}','win')"><i class="fas fa-check"></i></button>
              <button class="btn btn-outline-bm btn-sm" onclick="settleBet('${b.id}','lose')"><i class="fas fa-xmark"></i></button>
            ` : '—'}
          </td>
        </tr>`).join('');
    }
    document.addEventListener('bm:balance', () => mountChrome());
    mountChrome();
    renderHistory();
  </script>
</body>
</html>
