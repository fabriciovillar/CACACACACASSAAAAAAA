<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crear cuenta - BetGPT Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>
<body>
  <div class="bm-loader"><div class="bm-spinner"></div></div>
  <div class="auth-wrap">
    <div class="bm-card auth-card">
      <div class="text-center mb-4">
        <a href="index.html" class="bm-brand"><i class="fas fa-trophy text-green"></i> Bet<span class="accent">GPT</span> Pro</a>
        <h4 class="mt-3 mb-1">Crear cuenta</h4>
        <p class="text-muted-bm">Solo toma unos segundos</p>
      </div>
      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="row g-2">
          <div class="col-md-6"><label class="form-label">Nombre</label><input class="form-control" name="nombre" required></div>
          <div class="col-md-6"><label class="form-label">Apellido</label><input class="form-control" name="apellido" required></div>
          <div class="col-md-6"><label class="form-label">DNI</label><input class="form-control" name="dni" required></div>
          <div class="col-md-6"><label class="form-label">Fecha de nacimiento</label><input type="date" class="form-control" name="nacimiento" required></div>
          <div class="col-12"><label class="form-label">Correo</label><input type="email" class="form-control" name="email" required></div>
          <div class="col-md-6"><label class="form-label">Contraseña</label><input type="password" class="form-control" name="password" required></div>
          <div class="col-md-6"><label class="form-label">Confirmar contraseña</label><input type="password" class="form-control" name="password2" required></div>
        </div>
        <div class="d-grid mt-4">
          <button class="btn btn-bm"><i class="fas fa-user-plus me-1"></i>Crear cuenta</button>
        </div>
        <p class="text-center mt-3 text-muted-bm">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script src="auth.js"></script>
</body>
</html>
